<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - F1 Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=11">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="brand">
                <span class="logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 5 L10 12 L3 19" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M10 5 L17 12 L10 19" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
                        <path d="M17 5 L24 12 L17 19" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
                    </svg>
                </span>
                <span>F1 HUB</span>
            </a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/standings">Standings</a></li>
                <li><a href="/calendar">Calendar</a></li>
                <li><a href="/news" class="active">News</a></li>
                <li><a href="/videos">Videos</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <header class="page-heading">
            <h2>Latest News</h2>
            <p class="subtitle">Updates from the paddock</p>
        </header>

        <div id="newsList" class="news-grid">
            <p class="empty-state">Loading news…</p>
        </div>
    </div>

    <script>
        fetch('/api/news')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('newsList');
                if (!data.length) {
                    list.innerHTML = '<p class="empty-state">No news yet.</p>';
                    return;
                }
                list.innerHTML = data.map(article => {
                    const dateStr = new Date(article.publishedDate).toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });
                    return `
                        <a class="news-card has-image" href="/news/${article.id}">
                            ${article.imageUrl ? `<div class="news-card-image"><img src="${article.imageUrl}" alt="${article.title}" loading="lazy"></div>` : ''}
                            <div class="news-card-body">
                                <h3>${article.title}</h3>
                                <p>${article.content}</p>
                                <div class="news-card-footer">
                                    <small>${dateStr}</small>
                                    <span class="external-arrow">Read article →</span>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');
            })
            .catch(() => {
                document.getElementById('newsList').innerHTML =
                    '<p class="empty-state">Unable to load news.</p>';
            });
    </script>
</body>
</html>
