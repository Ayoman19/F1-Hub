<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Calendar - F1 Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=11">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="brand">
                <span class="logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 5 L10 12 L3 19" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M10 5 L17 12 L10 19" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
                        <path d="M17 5 L24 12 L17 19" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
                    </svg>
                </span>
                <span>F1 HUB</span>
            </a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/standings">Standings</a></li>
                <li><a href="/calendar" class="active">Calendar</a></li>
                <li><a href="/news">News</a></li>
                <li><a href="/videos">Videos</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <header class="page-heading">
            <h2>Race Calendar</h2>
            <p class="subtitle">Every Grand Prix this season</p>
        </header>

        <div id="raceList" class="race-grid">
            <p class="empty-state">Loading races…</p>
        </div>
    </div>

    <script>
        const todayIso = new Date().toISOString().slice(0, 10);

        fetch('/api/races')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('raceList');
                if (!data.length) {
                    list.innerHTML = '<p class="empty-state">No races scheduled yet.</p>';
                    return;
                }
                list.innerHTML = data.map(race => {
                    const isPast = race.date < todayIso;
                    const dateStr = new Date(race.date).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
                    return `
                        <a class="race-card ${isPast ? 'past' : ''}" href="/race/${race.id}">
                            ${race.round ? `<span class="race-round-chip">R${race.round}</span>` : ''}
                            <h3>${race.name}</h3>
                            <p><strong>${race.circuit}</strong> · ${race.country}</p>
                            <p>${dateStr}</p>
                            <span class="race-card-cta">View details →</span>
                        </a>
                    `;
                }).join('');
            })
            .catch(() => {
                document.getElementById('raceList').innerHTML =
                    '<p class="empty-state">Unable to load races.</p>';
            });
    </script>
</body>
</html>
